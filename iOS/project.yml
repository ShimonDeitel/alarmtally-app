name: Alarmtally
options:
  bundleIdPrefix: com.shimondeitel.snoozetracker
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Alarmtally:
    type: application
    platform: iOS
    sources:
      - path: Alarmtally
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.snoozetracker
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Alarmtally/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  AlarmtallyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AlarmtallyTests
      - path: Alarmtally.storekit
    dependencies:
      - target: Alarmtally
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.snoozetracker.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  AlarmtallyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AlarmtallyUITests
    dependencies:
      - target: Alarmtally
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.snoozetracker.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Alarmtally:
    build:
      targets:
        Alarmtally: all
        AlarmtallyTests: [test]
        AlarmtallyUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Alarmtally.storekit
    test:
      config: Debug
      storeKitConfiguration: Alarmtally.storekit
      targets:
        - AlarmtallyTests
        - AlarmtallyUITests
    archive:
      config: Release
